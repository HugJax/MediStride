; MediStride Firmware
; Plateforme : Seeed Studio XIAO ESP32-S3
; Framework  : Arduino

[env]
platform = espressif32@^6.7.0
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200

; BLE stack léger pour ESP32
lib_deps =
    h2zero/NimBLE-Arduino@^1.4.1

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; Décommenter pour activer l'IMU MPU-6050
    ; -DIMU_ENABLED

board_build.partitions = default.csv

; --- Variantes pour distribution ---
; Compiler le firmware « pied gauche » :   pio run -e xiao_esp32s3_left
; Compiler le firmware « pied droit »  :   pio run -e xiao_esp32s3_right
; Le binaire universel (détection auto par GPIO9) reste `pio run -e xiao_esp32s3`.

[env:xiao_esp32s3]
; Côté déterminé au runtime par GPIO9 (pont de soudure)
build_flags = ${env.build_flags}

[env:xiao_esp32s3_left]
build_flags = ${env.build_flags} -DFORCE_SIDE_LEFT

[env:xiao_esp32s3_right]
build_flags = ${env.build_flags} -DFORCE_SIDE_RIGHT
