name: Build firmware binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            firmware/.pio
          key: pio-${{ hashFiles('firmware/platformio.ini') }}

      - name: Build firmware (gauche)
        working-directory: firmware
        run: pio run -e xiao_esp32s3_left

      - name: Build firmware (droit)
        working-directory: firmware
        run: pio run -e xiao_esp32s3_right

      - name: Build firmware (universel)
        working-directory: firmware
        run: pio run -e xiao_esp32s3

      - name: Rename artifacts
        run: |
          cp firmware/.pio/build/xiao_esp32s3_left/firmware.bin medistride-left.bin
          cp firmware/.pio/build/xiao_esp32s3_right/firmware.bin medistride-right.bin
          cp firmware/.pio/build/xiao_esp32s3/firmware.bin medistride-universal.bin
          sha256sum medistride-*.bin > SHA256SUMS.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: medistride-firmware
          path: |
            medistride-left.bin
            medistride-right.bin
            medistride-universal.bin
            SHA256SUMS.txt

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            medistride-left.bin
            medistride-right.bin
            medistride-universal.bin
            SHA256SUMS.txt
          generate_release_notes: true
